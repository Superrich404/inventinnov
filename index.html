    <style amp-custom>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'Orbitron', monospace;
        position: relative;
        background: #08007b;
        background-image: radial-gradient(circle at 10% 20%, rgba(255, 216, 0, 0.15) 2%, transparent 2.5%), 
                          radial-gradient(circle at 80% 70%, rgba(255, 200, 0, 0.1) 1.5%, transparent 2%);
        background-size: 40px 40px, 30px 30px;
        background-attachment: fixed;
      }

      .container {
        max-width: 450px;
        height: 100vh;
        margin: 0 auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
      }

      .welcome {
        max-width: 350px;
        margin: 0 auto;
        text-align: center;
      }

      .welcome h3 {
        font-size: 14px;
        color: #ff0000;
        overflow: hidden;
        border-right: 0.15em solid #ff0000;
        white-space: nowrap;
        letter-spacing: 0.09em;
        animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        text-shadow: 0 0 5px #ffffff;
      }

      @keyframes typing {
        from {
          width: 0;
        }

        to {
          width: 100%;
        }
      }

      @keyframes blink-caret {

        from,
        to {
          border-color: transparent;
        }

        50% {
          border-color: #ff0000;
        }
      }

      .banner {
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 216, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .banner:hover {
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(255, 216, 0, 0.5);
      }

      .btn-login,
      .btn-daftar {
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
        margin-top: 20px;
        border-radius: 50px;
        transition: all 0.3s ease;
      }

      .btn-login {
        background: linear-gradient(135deg, #ff0000, #ffffff);
        color: #ffffff;
        box-shadow: 0 5px 15px rgba(255, 216, 0, 0.4);
      }

      .btn-login:hover {
        background: linear-gradient(135deg, #ffea00, #ffcc00);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255, 216, 0, 0.6);
      }

      .btn-daftar {
        background: linear-gradient(135deg, #222, #111);
        color: #ff0000;
        border: 1px solid #ff0000;
        box-shadow: 0 0 10px rgba(255, 216, 0, 0.3);
      }

      .btn-daftar:hover {
        background: linear-gradient(135deg, #333, #222);
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(255, 216, 0, 0.5);
      }

      .copyright {
        text-align: center;
        color: #ffffff;
        font-size: 11px;
        margin-top: 20px;
      }

      .karlota {
        position: fixed;
        z-index: 1;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        pointer-events: none;
      }

      .glow-on-hover {
        border: none;
        outline: none;
        color: #ff0000;
        background: #111;
        cursor: pointer;
        position: relative;
        z-index: 0;
        border-radius: 50px;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .glow-on-hover:before {
        content: '';
        background: linear-gradient(88deg, #ff0000, #ffffff, #ff0000, #ff6600, #ff0000, #ffffff, #ff0000, #ff6600);
        position: absolute;
        top: -2px;
        left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(8px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .3s ease-in-out;
        border-radius: 50px;
      }

      .glow-on-hover:before {
        opacity: 1;
      }

      .glow-on-hover:after {
        z-index: -1;
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
        left: 0;
        top: 0;
        border-radius: 50px;
      }

      .glow-on-hover:hover {
        transform: scale(1.05);
        color: #fff;
      }

      @keyframes glowing {
        0% {
          background-position: 0 0;
        }

        50% {
          background-position: 400% 0;
        }

        100% {
          background-position: 0 0;
        }
      }

      /* Tambahan efek slot machine */
      @keyframes slotFlash {
        0% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .slot-effect {
        animation: slotFlash 0.5s ease infinite alternate;
      }
